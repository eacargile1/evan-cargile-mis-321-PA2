<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTS — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/nav.css">
    <link rel="stylesheet" href="/css/site.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <nav class="site-nav">
        <div class="site-nav-inner">
            <a href="/" class="snav-brand">
                <span class="snav-logo">LTS</span>
                <span class="snav-tagline">Legendary Training Services</span>
            </a>
            <div class="snav-links">
                <a href="/" class="snav-link">Home</a>
                <a href="/browse.html" class="snav-link">Browse Sessions</a>
                <a href="/calendar.html" class="snav-link">Calendar</a>
                <a href="/#packages" class="snav-link">Packages &amp; Deals</a>
            </div>
            <div class="snav-actions">
                <a href="/browse.html" class="snav-book">Book a Session</a>
            </div>
        </div>
    </nav>
    </nav>

    <main class="main-content auth-page">
        <div id="tab-bar">
            <button class="tab-btn active" data-tab="login">Sign In</button>
            <button class="tab-btn" data-tab="register">Create Account</button>
        </div>

        <div id="login-tab">
            <h2>Sign In</h2>
            <form id="login-form">
                <label>Email</label>
                <input type="email" id="login-email" required>
                <label>Password</label>
                <input type="password" id="login-password" required>
                <button type="submit">Sign In</button>
                <div id="login-error" class="message error" hidden></div>
            </form>
        </div>

        <div id="register-tab" hidden>
            <h2>Create Account</h2>
            <form id="register-form">
                <label>Role</label>
                <select id="reg-role">
                    <option value="2">Pet Owner</option>
                    <option value="1">Trainer</option>
                </select>
                <label>First Name</label>
                <input type="text" id="reg-first" required>
                <label>Last Name</label>
                <input type="text" id="reg-last" required>
                <label>Email</label>
                <input type="email" id="reg-email" required>
                <label>Password</label>
                <input type="password" id="reg-password" required minlength="8">
                <label>Phone</label>
                <input type="tel" id="reg-phone">
                <label>Address</label>
                <input type="text" id="reg-address">
                <button type="submit">Create Account</button>
                <div id="register-error" class="message error" hidden></div>
            </form>
        </div>
    </main>

    <script src="/js/auth.js"></script>
</body>
</html>
